name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements-lite.txt pytest

      - name: Seed lite corpus
        run: python3 scripts/seed_corpus.py lite

      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -q

      - name: Build frontend
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: |
          cd frontend
          npm ci
          npm run build
