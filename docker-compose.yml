x-api-env: &api-env
  POSTGRES_HOST: postgres_oss
  POSTGRES_PORT: 5432
  POSTGRES_DB: veda_master
  POSTGRES_USER: veda
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_dev_secret}
  QDRANT_HOST: qdrant_oss
  QDRANT_PORT: 6333
  NEO4J_URI: bolt://neo4j_oss:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_local_secret}
  REDIS_URL: redis://redis_oss:6379/0
  TEI_URL: http://tei_oss:80
  VLLM_URL: http://vllm_oss:8000/v1
  EMBEDDING_FALLBACK: sentence-transformers
  APP_ENV: ${APP_ENV:-development}
  APP_MODE: docker
  EMBEDDING_DIM: "1024"

services:
  postgres_oss:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: veda_master
      POSTGRES_USER: veda
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_dev_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veda -d veda_master"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant_oss:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  neo4j_oss:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j_local_secret}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "neo4j status 2>/dev/null | grep -q Running"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s

  redis_oss:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  tei_oss:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    profiles: ["gpu", "full"]
    environment:
      MODEL_ID: BAAI/bge-m3
      MAX_BATCH_TOKENS: 16384
    ports:
      - "8080:80"
    volumes:
      - tei_cache:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *api-env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data
      - ./frontend/dist:/app/frontend/dist:ro
    depends_on:
      postgres_oss:
        condition: service_healthy
      qdrant_oss:
        condition: service_healthy
      redis_oss:
        condition: service_healthy
      neo4j_oss:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 1
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *api-env
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data
    depends_on:
      - api
      - redis_oss
    command: celery -A src.tasks.celery_app worker --loglevel=info --concurrency=2

  vllm_oss:
    image: vllm/vllm-openai:latest
    profiles: ["gpu", "full"]
    environment:
      VLLM_MODEL: ${VLLM_MODEL:-meta-llama/Meta-Llama-3-8B-Instruct}
    ports:
      - "8001:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command:
      - --model
      - ${VLLM_MODEL:-meta-llama/Meta-Llama-3-8B-Instruct}
      - --max-model-len
      - "4096"
      - --tensor-parallel-size
      - "1"

  nginx:
    image: nginx:alpine
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  qdrant_storage:
  neo4j_data:
  redis_data:
  tei_cache:
